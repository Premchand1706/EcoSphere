services:
  # Backend API Web Service
  - type: web
    name: ecosphere-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: ecosphere-db
          property: connectionString
      - key: JWT_SECRET
        value: "ecosphere-production-secret-key-2026-hackathon"

  # Frontend React Static Site
  - type: web
    name: ecosphere-frontend
    env: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist

databases:
  - name: ecosphere-db
    plan: free
