services:
  # Backend API Web Service
  - type: web
    name: ecosphere-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run prisma:seed && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Frontend React Static Site
  - type: web
    name: ecosphere-frontend
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ecosphere-backend
          property: host
